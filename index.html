<!DOCTYPE html>
<html>
    <head>

            body{

            label{
                display:block;

<h2>Blood Group Registration Form</h2>
<form>
    <label>Full Name:</label>

    <label>Age:</label>

    <label>Gender:</label>
    <select name="gender" required>
        <option value="">--Select--</option>
        <option>Male</option>

        <option>Others</option>
    </select>

    <label>b\Blood Group:</label>

        <option value="">--Select--</option>
        <option>A+ve</option>
        <option>A-ve</option>
        <option>b+ve</option>
        <option>b-ve</option>
        <option>AB+ve</option>
        <option>AB-ve</option>
        <option>O+ve</option>
        <option>O-ve</option>
    </select>

    <label>Contact Number:</label>
    <input type="text" name="Contact" required>

    <input type="submit" value="Submit">

</form>

</html>
